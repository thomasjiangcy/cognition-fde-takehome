[project]
name = "github-devin-automation"
version = "0.1.0"
description = "FastAPI service for scheduled and manual GitHub-to-Devin automation."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "apscheduler>=3.11,<4.0",
    "fastapi>=0.115,<1.0",
    "jinja2>=3.1,<4.0",
    "uvicorn>=0.30,<1.0",
]

[dependency-groups]
dev = [
    "httpx>=0.27,<1.0",
    "pytest>=8.3,<9.0",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
