name: github-devin-automation

services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      otel-lgtm:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://automation:automation@db:5432/automation}
      DEVIN_API_KEY: ${DEVIN_API_KEY:-}
      DEVIN_ORG_ID: ${DEVIN_ORG_ID:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
    ports:
      - "8080:8080"
    restart: unless-stopped

  db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-automation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-automation}
      POSTGRES_USER: ${POSTGRES_USER:-automation}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-automation} -d ${POSTGRES_DB:-automation}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql

  otel-lgtm:
    image: grafana/otel-lgtm:0.29.0
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 5s
    ports:
      - "3000:3000"
      - "4318:4318"
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:2026.7.1
    command: tunnel --no-autoupdate --url http://app:8080
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
