name: github-devin-webhooks

services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:2026.7.1
    command: tunnel --no-autoupdate --url http://app:8080
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
